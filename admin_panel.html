<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel — The Munch Box</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F0F4F8;color:#1A2533;min-height:100vh;}
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:#0D1B2A;display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto;}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-name{font-size:1rem;font-weight:700;color:#fff;line-height:1.2;}
.brand-sub{font-size:0.68rem;color:rgba(255,255,255,0.4);letter-spacing:0.15em;text-transform:uppercase;margin-top:2px;}
.sidebar-section-label{font-size:0.6rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:16px 20px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.55);transition:all 0.15s;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;}
.nav-item:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.05);}
.nav-item.active{color:#fff;background:rgba(45,125,210,0.2);border-left-color:#2D7DD2;}
.nav-icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:#27AE60;color:white;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:10px;}
.nav-soon{margin-left:auto;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);font-size:0.58rem;font-weight:600;padding:2px 6px;border-radius:10px;}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.72rem;color:rgba(255,255,255,0.25);}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:white;border-bottom:1px solid #E2EAF4;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:1rem;font-weight:600;color:#0D1B2A;}
.topbar-sub{font-size:0.75rem;color:#6B7C93;margin-top:1px;}
.admin-chip{background:#EBF3FF;color:#1A4A7A;font-size:0.72rem;font-weight:600;padding:4px 12px;border-radius:20px;}
.page{padding:28px;flex:1;}
.card{background:white;border:1px solid #E2EAF4;border-radius:12px;margin-bottom:20px;overflow:hidden;}
.card-header{padding:16px 22px;border-bottom:1px solid #E2EAF4;display:flex;align-items:center;gap:10px;}
.card-header-icon{font-size:1.1rem;}
.card-header-title{font-size:0.88rem;font-weight:700;color:#0D1B2A;}
.card-header-sub{font-size:0.72rem;color:#6B7C93;margin-top:1px;}
.card-body{padding:22px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.span2{grid-column:span 2;}
.form-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:#6B7C93;}
.required{color:#E74C3C;margin-left:2px;}
.form-input,.form-select{border:1.5px solid #E2EAF4;border-radius:8px;padding:9px 13px;font-size:0.85rem;font-family:'Inter',sans-serif;color:#1A2533;background:white;outline:none;transition:border-color 0.15s;width:100%;}
.form-input:focus,.form-select:focus{border-color:#2D7DD2;box-shadow:0 0 0 3px rgba(45,125,210,0.1);}
.form-textarea{border:1.5px solid #E2EAF4;border-radius:8px;padding:9px 13px;font-size:0.85rem;font-family:'Inter',sans-serif;color:#1A2533;background:white;outline:none;transition:border-color 0.15s;width:100%;resize:vertical;min-height:70px;}
.form-textarea:focus{border-color:#2D7DD2;box-shadow:0 0 0 3px rgba(45,125,210,0.1);}
.form-hint{font-size:0.72rem;color:#6B7C93;}
.form-input.error{border-color:#E74C3C;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:'Inter',sans-serif;}
.btn-primary{background:#2D7DD2;color:white;}
.btn-primary:hover{background:#1A6BBE;}
.btn-primary:disabled{background:#A0C4E8;cursor:not-allowed;}
.btn-secondary{background:white;color:#1A2533;border:1.5px solid #E2EAF4;}
.btn-secondary:hover{background:#F5F8FC;}
.btn-danger{background:#FDEDEC;color:#E74C3C;border:1.5px solid #FADBD8;}
.btn-danger:hover{background:#FADBD8;}
.btn-success{background:#EAFAF1;color:#27AE60;border:1.5px solid #A9DFBF;}
.btn-success:hover{background:#D5F5E3;}
.btn-warning{background:#FEF9E7;color:#B7770D;border:1.5px solid #F9E79F;}
.btn-warning:hover{background:#FCF3CF;}
.btn-sm{padding:6px 12px;font-size:0.76rem;}
.btn-xs{padding:4px 9px;font-size:0.72rem;}
.btn-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
.status-saved{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;color:#27AE60;font-weight:600;}
.status-saved::before{content:'●';font-size:0.5rem;}
.status-unsaved{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;color:#F4A736;font-weight:600;}
.status-unsaved::before{content:'●';font-size:0.5rem;}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#0D1B2A;color:white;padding:12px 18px;border-radius:10px;font-size:0.82rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;animation:slideIn 0.2s ease;}
.toast.success{background:#1E7A4E;}.toast.error{background:#C0392B;}.toast.info{background:#1A4A7A;}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:#6B7C93;text-align:center;}
.cs-icon{font-size:3rem;margin-bottom:16px;}.cs-title{font-size:1.1rem;font-weight:600;color:#1A2533;margin-bottom:6px;}
.cs-desc{font-size:0.82rem;max-width:300px;line-height:1.6;}
.cs-badge{margin-top:16px;font-size:0.75rem;color:#2D7DD2;background:#EBF3FF;padding:6px 16px;border-radius:20px;}
.page-eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#2D7DD2;margin-bottom:4px;}
.page-title{font-size:1.4rem;font-weight:700;color:#0D1B2A;}
.page-desc{font-size:0.8rem;color:#6B7C93;margin-top:3px;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.loading-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;}
.loading-box{background:white;border-radius:12px;padding:32px 40px;text-align:center;}
.loading-spinner{font-size:2.2rem;animation:spin 1s linear infinite;display:block;margin-bottom:12px;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.modal-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:white;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid #E2EAF4;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:1rem;font-weight:700;color:#0D1B2A;}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#6B7C93;padding:2px 6px;border-radius:6px;}
.modal-close:hover{background:#F0F4F8;}
.modal-body{padding:24px;}.modal-footer{padding:16px 24px;border-top:1px solid #E2EAF4;display:flex;gap:10px;justify-content:flex-end;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px;}
.stat-box{background:white;border:1px solid #E2EAF4;border-radius:10px;padding:16px;text-align:center;}
.stat-value{font-size:1.6rem;font-weight:700;color:#0D1B2A;line-height:1;}
.stat-label{font-size:0.7rem;color:#6B7C93;margin-top:4px;text-transform:uppercase;letter-spacing:0.1em;}
.stat-box.blue .stat-value{color:#2D7DD2;}.stat-box.green .stat-value{color:#27AE60;}.stat-box.red .stat-value{color:#E74C3C;}.stat-box.gold .stat-value{color:#C9A84C;}
.filters-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.search-input{border:1.5px solid #E2EAF4;border-radius:8px;padding:7px 13px;font-size:0.82rem;font-family:'Inter',sans-serif;outline:none;width:220px;}
.search-input:focus{border-color:#2D7DD2;}
.menu-table{width:100%;border-collapse:collapse;}
.menu-table th{background:#F5F8FC;padding:10px 14px;text-align:left;font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#6B7C93;border-bottom:1px solid #E2EAF4;white-space:nowrap;}
.menu-table td{padding:11px 14px;font-size:0.83rem;border-bottom:1px solid #F0F4F8;vertical-align:middle;}
.menu-table tr:last-child td{border-bottom:none;}.menu-table tr:hover td{background:#FAFCFF;}
.serial-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:#EBF3FF;color:#1A4A7A;font-weight:700;font-size:0.8rem;border-radius:8px;}
.item-name-cell{font-weight:600;color:#0D1B2A;}.item-desc-cell{font-size:0.75rem;color:#6B7C93;margin-top:2px;}
.price-cell{font-weight:700;color:#0D1B2A;white-space:nowrap;}
.kitchen-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:0.7rem;font-weight:600;}
.k1{background:#EBF5FF;color:#1A4A7A;}.k2{background:#FFF3E8;color:#A85000;}.k3{background:#EAFAF1;color:#1A7A4E;}
.cat-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:0.7rem;font-weight:600;background:#F0F4F8;color:#4A5568;}
.toggle{position:relative;display:inline-block;width:40px;height:22px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#CBD5E0;border-radius:22px;transition:0.2s;}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked + .toggle-slider{background:#27AE60;}
.toggle input:checked + .toggle-slider:before{transform:translateX(18px);}
.empty-state{text-align:center;padding:48px 20px;color:#6B7C93;}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}.empty-title{font-size:1rem;font-weight:600;color:#1A2533;margin-bottom:6px;}
.empty-desc{font-size:0.8rem;max-width:280px;margin:0 auto;line-height:1.6;}
.confirm-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.6);z-index:600;display:flex;align-items:center;justify-content:center;}
.confirm-box{background:white;border-radius:12px;padding:28px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.confirm-icon{font-size:2.5rem;margin-bottom:12px;}.confirm-title{font-size:1rem;font-weight:700;color:#0D1B2A;margin-bottom:6px;}
.confirm-desc{font-size:0.82rem;color:#6B7C93;margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.waiters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:4px;}
.waiter-card{background:white;border:1px solid #E2EAF4;border-radius:12px;padding:20px;transition:box-shadow 0.15s;}
.waiter-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}.waiter-card.inactive{opacity:0.6;}
.waiter-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:white;}
.waiter-name{font-size:0.95rem;font-weight:700;color:#0D1B2A;margin-bottom:2px;}
.waiter-id{font-size:0.7rem;color:#6B7C93;margin-bottom:8px;font-family:monospace;}
.waiter-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.waiter-pin-display{background:#F0F4F8;border-radius:6px;padding:3px 10px;font-size:0.75rem;font-weight:600;color:#4A5568;font-family:monospace;}
.waiter-status-badge{font-size:0.68rem;font-weight:700;padding:2px 9px;border-radius:10px;}
.badge-active{background:#EAFAF1;color:#1A7A4E;}.badge-inactive{background:#FDEDEC;color:#C0392B;}
.waiter-card-footer{display:flex;gap:8px;padding-top:12px;border-top:1px solid #F0F4F8;}
.waiter-last{font-size:0.7rem;color:#6B7C93;margin-bottom:12px;}
.pin-wrap{position:relative;display:flex;align-items:center;}
.pin-wrap .form-input{padding-right:40px;letter-spacing:0.2em;font-family:monospace;font-size:1rem;}
.pin-toggle{position:absolute;right:10px;background:none;border:none;cursor:pointer;font-size:1rem;color:#6B7C93;padding:4px;}
.av0{background:#2D7DD2;}.av1{background:#27AE60;}.av2{background:#E74C3C;}
.av3{background:#C9A84C;}.av4{background:#8B3A1A;}.av5{background:#6B3FA0;}
.av6{background:#1A7A4E;}.av7{background:#A85000;}

/* ── TAX & DISCOUNT SECTION ── */
.tax-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:0;}
.tax-card{border:2px solid #E2EAF4;border-radius:12px;overflow:hidden;transition:border-color 0.2s;}
.tax-card.active-tax{border-color:#2D7DD2;}
.tax-card-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.tax-num{font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#6B7C93;}
.tax-card-body{padding:0 16px 16px;}
.tax-preview-btn{display:flex;align-items:center;justify-content:center;padding:10px;background:#F5F8FC;border-radius:8px;font-size:1.1rem;font-weight:800;color:#2D7DD2;border:none;cursor:default;width:100%;margin-top:8px;letter-spacing:0.05em;}
.discount-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.discount-type-card{border:2px solid #E2EAF4;border-radius:12px;padding:20px;cursor:pointer;transition:all 0.15s;text-align:center;}
.discount-type-card:hover{border-color:#2D7DD2;background:#F5F9FF;}
.discount-type-card.selected{border-color:#2D7DD2;background:#EBF3FF;}
.disc-icon{font-size:2rem;margin-bottom:8px;}
.disc-title{font-weight:700;font-size:0.9rem;color:#0D1B2A;margin-bottom:4px;}
.disc-desc{font-size:0.75rem;color:#6B7C93;line-height:1.4;}
.bill-sim{background:#F0F4F8;border-radius:10px;padding:20px;}
.bill-sim-title{font-size:0.68rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#6B7C93;margin-bottom:14px;}
.sim-row{display:flex;justify-content:space-between;font-size:0.82rem;padding:6px 0;border-bottom:1px dotted #E2EAF4;}
.sim-row:last-child{border-bottom:none;font-weight:700;font-size:0.9rem;}
.sim-row.discount{color:#E74C3C;}
.sim-row.tax{color:#1A4A7A;}
.sim-row.total{color:#0D1B2A;padding-top:10px;margin-top:4px;}
.sim-input-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;}
.sim-input-group{display:flex;flex-direction:column;gap:4px;}
.sim-label{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6B7C93;}
.sim-input{border:1.5px solid #E2EAF4;border-radius:8px;padding:7px 11px;font-size:0.85rem;font-family:'Inter',sans-serif;outline:none;width:120px;}
.sim-input:focus{border-color:#2D7DD2;}

@media(max-width:900px){.tax-cards{grid-template-columns:1fr;}}
@media(max-width:768px){.sidebar{width:200px;}.main{margin-left:200px;}.form-grid{grid-template-columns:1fr;}.form-group.span2{grid-column:span 1;}.discount-row{grid-template-columns:1fr;}.tax-cards{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.sidebar{display:none;}.main{margin-left:0;}.tax-cards{grid-template-columns:1fr;}.waiters-grid{grid-template-columns:1fr;}}

/* ── INVENTORY MODULE CSS ── */
.nav-badge-alert{background:#E74C3C!important;color:white!important;animation:pulse-badge 1.5s ease infinite;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* Inventory cards */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:20px;}
.inv-card{background:white;border-radius:14px;padding:16px;border:1.5px solid #E2EAF4;transition:all 0.15s;position:relative;overflow:hidden;}
.inv-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.inv-card.ok::before{background:#27AE60;}
.inv-card.low::before{background:#F4A736;}
.inv-card.critical::before{background:#E74C3C;}
.inv-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);border-color:#2D7DD2;}
.inv-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.inv-card-name{font-size:0.9rem;font-weight:700;color:#0D1B2A;}
.inv-card-cat{font-size:0.68rem;color:#6B7C93;margin-top:2px;}
.inv-stock-display{display:flex;align-items:baseline;gap:4px;}
.inv-stock-num{font-size:1.8rem;font-weight:800;line-height:1;}
.inv-stock-unit{font-size:0.78rem;color:#6B7C93;font-weight:600;}
.inv-stock-bar{height:4px;border-radius:4px;background:#F0F4F8;margin:8px 0 10px;overflow:hidden;}
.inv-stock-bar-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.inv-meta-row{display:flex;justify-content:space-between;font-size:0.72rem;color:#6B7C93;}
.inv-badge{font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:8px;}
.inv-badge.ok{background:#EAFAF1;color:#1A7A4E;}
.inv-badge.low{background:#FEF9E7;color:#856404;}
.inv-badge.critical{background:#FDEDEC;color:#C0392B;}

/* Recipe cards */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px;}
.recipe-card{background:white;border-radius:14px;padding:16px;border:1.5px solid #E2EAF4;transition:all 0.15s;cursor:pointer;}
.recipe-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);border-color:#2D7DD2;transform:translateY(-2px);}
.rc-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.rc-photo{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#F0F4F8;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;}
.rc-photo img{width:100%;height:100%;object-fit:cover;}
.rc-name{font-size:0.9rem;font-weight:700;color:#0D1B2A;}
.rc-item{font-size:0.72rem;color:#6B7C93;}
.rc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.rc-stat{background:#F5F8FC;border-radius:8px;padding:8px;text-align:center;}
.rc-stat-val{font-size:0.88rem;font-weight:800;color:#0D1B2A;}
.rc-stat-label{font-size:0.6rem;color:#6B7C93;margin-top:1px;}
.rc-stat.profit .rc-stat-val{color:#27AE60;}
.rc-stat.cost .rc-stat-val{color:#E74C3C;}
.rc-ingredients{font-size:0.72rem;color:#6B7C93;}

/* Recipe builder form */
.rb-form{background:white;border-radius:16px;padding:24px;border:1.5px solid #E2EAF4;}
.rb-section{margin-bottom:20px;}
.rb-section-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#6B7C93;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #F0F4F8;}
.ing-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#F5F8FC;border-radius:10px;margin-bottom:8px;}
.ing-name{flex:1;font-size:0.82rem;font-weight:600;color:#0D1B2A;}
.ing-unit{font-size:0.7rem;color:#6B7C93;background:#E2EAF4;padding:2px 8px;border-radius:6px;white-space:nowrap;}
.ing-qty-ctrl{display:flex;align-items:center;gap:6px;}
.ing-qty-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid #E2EAF4;background:white;font-size:0.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
.ing-qty-btn:active{background:#F0F4F8;}
.ing-qty-input{width:64px;border:1.5px solid #E2EAF4;border-radius:7px;padding:5px 6px;font-size:0.85rem;font-weight:700;text-align:center;outline:none;}
.ing-qty-input:focus{border-color:#2D7DD2;}
.ing-cost{font-size:0.72rem;font-weight:700;color:#2D7DD2;min-width:64px;text-align:right;}
.ing-del{background:none;border:none;color:#CBD5E0;cursor:pointer;font-size:1rem;padding:2px 6px;}
.ing-del:hover{color:#E74C3C;}

/* Cost breakdown */
.cost-breakdown{background:linear-gradient(135deg,#0D1B2A,#1A2F44);border-radius:14px;padding:20px;color:white;}
.cb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:0.82rem;}
.cb-row:last-child{border-bottom:none;padding-top:10px;margin-top:4px;border-top:1px solid rgba(255,255,255,0.15);font-size:1rem;font-weight:800;}
.cb-label{color:rgba(255,255,255,0.7);}
.cb-value{font-weight:700;color:white;}
.cb-value.profit{color:#27AE60;}
.cb-value.cost{color:#E74C3C;}
.margin-bar{height:8px;border-radius:8px;background:rgba(255,255,255,0.1);margin:12px 0 4px;overflow:hidden;}
.margin-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#E74C3C,#F4A736,#27AE60);transition:width 0.5s;}

/* Version history */
.version-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:600;background:#F0F4F8;color:#6B7C93;cursor:pointer;margin-right:6px;margin-bottom:6px;border:1.5px solid #E2EAF4;}
.version-chip.active{background:#0D1B2A;color:white;border-color:#0D1B2A;}
.version-chip:hover{border-color:#2D7DD2;color:#2D7DD2;}

/* Stock preview */
.stock-preview{background:#EBF3FF;border:1.5px solid #2D7DD2;border-radius:12px;padding:14px;}
.sp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:0.78rem;border-bottom:1px dotted #C5D9F0;}
.sp-row:last-child{border-bottom:none;}
.sp-row.warn{color:#E74C3C;}
.sp-row.ok{color:#27AE60;}

/* Dark mode */
.admin-wrap.dark{background:#111827;}
.admin-wrap.dark .main{background:#111827;}
.admin-wrap.dark .topbar{background:#0D1B2A;border-bottom:1px solid rgba(255,255,255,0.06);}
.admin-wrap.dark .card,.admin-wrap.dark .inv-card,.admin-wrap.dark .recipe-card,.admin-wrap.dark .rb-form{background:#1E2A3A;border-color:rgba(255,255,255,0.08);}
.admin-wrap.dark .page-title,.admin-wrap.dark .card-header-title,.admin-wrap.dark .inv-card-name,.admin-wrap.dark .rc-name,.admin-wrap.dark .ing-name{color:white;}
.admin-wrap.dark .page-desc,.admin-wrap.dark .card-header-sub,.admin-wrap.dark .inv-card-cat,.admin-wrap.dark .rc-item,.admin-wrap.dark .inv-meta-row{color:rgba(255,255,255,0.5);}
.admin-wrap.dark .form-input,.admin-wrap.dark .form-select,.admin-wrap.dark .form-textarea{background:#2A3A4A;border-color:rgba(255,255,255,0.1);color:white;}
.admin-wrap.dark .rc-stat,.admin-wrap.dark .ing-row,.admin-wrap.dark .stock-preview{background:rgba(255,255,255,0.05);}
.admin-wrap.dark .inv-stock-bar{background:rgba(255,255,255,0.1);}
.admin-wrap.dark .topbar-title,.admin-wrap.dark .topbar-sub{color:white;}
.dark-toggle{background:none;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:8px;font-size:0.75rem;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">

    <button class="nav-item" id="nav-menu" onclick="showPage('menu')"><span class="nav-icon">🍽️</span> Menu Management<span class="nav-badge" id="badge-menu" style="display:none">✓</span></button>

    <button class="nav-item" id="nav-halls" onclick="showPage('halls')"><span class="nav-icon">🪑</span> Halls & Tables<span class="nav-badge" id="badge-halls" style="display:none">✓</span></button>
    <button class="nav-item" id="nav-reports" onclick="showPage('reports')"><span class="nav-icon">📊</span> Sales Reports<span class="nav-badge" id="badge-reports" style="display:none">✓</span></button>
    <button class="nav-item" id="nav-bills" onclick="showPage('bills')"><span class="nav-badge" id="badge-bills" style="display:none">✓</span><span class="nav-icon">🧾</span> Bill History</button>
    <div class="sidebar-section-label">Inventory</div>
    <button class="nav-item" id="nav-inventory" onclick="showPage('inventory')"><span class="nav-icon">📦</span> Raw Materials<span class="nav-badge nav-badge-alert" id="badge-inventory" style="display:none">!</span></button>
    <button class="nav-item" id="nav-recipes" onclick="showPage('recipes')"><span class="nav-icon">📋</span> Recipe Builder</button>

</div>
<div class="toast-wrap" id="toast-wrap"></div>
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <span class="loading-spinner">⏳</span>
    <div style="font-weight:600;color:#0D1B2A;font-size:0.95rem;">Loading Admin Panel...</div>
    <div style="font-size:0.75rem;color:#6B7C93;margin-top:6px;" id="loading-msg">Connecting to Firebase</div>
    <div style="font-size:0.68rem;color:#CBD5E0;margin-top:10px;">If stuck, check your internet connection</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCopRca27yKpeeoTC5U7rHxPdGuRpqbgvs",
  authDomain: "the-munch-box-cfb7f.firebaseapp.com",
  projectId: "the-munch-box-cfb7f",
  storageBucket: "the-munch-box-cfb7f.firebasestorage.app",
  messagingSenderId: "1095328694961",
  appId: "1:1095328694961:web:9fd65fddcf00d3b84d9890"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const CATEGORIES = ['Starters','Pizza','Burgers','Chinese','Grills & Tikka','Desi','Breads','Desserts','Drinks','Cakes'];
// Which categories support sizes and what type
const CAT_SIZE_TYPE = {
  'Pizza':   'SML',        // Small / Medium / Large
  'Drinks':  'SML',
  'Desi':    'HalfFull',   // Half / Full
};
// Categories with NO sizes
const CAT_NO_SIZE = ['Starters','Burgers','Chinese','Grills & Tikka','Breads','Desserts','Cakes'];
const KITCHENS   = ['Fast Food Kitchen','Desi Kitchen','Cakes Desserts & Drinks'];
const AV_COLORS  = ['av0','av1','av2','av3','av4','av5','av6','av7'];

let restaurantSettings = {};
let menuItems   = [];
let filteredItems = [];
let filterCat   = 'All';
let searchTerm  = '';
let editingMenuItem = null;
let waiters     = [];
let editingWaiter = null;
let deleteTarget = null;
let deleteType   = '';
let nextSerial  = 1;
let _modCount   = 0;

// Tax & Discount state
let taxSettings = {
  tax1: { name: 'GST', rate: 5, enabled: true },
  tax2: { name: 'Service Tax', rate: 3, enabled: true },
  tax3: { name: 'Extra Tax', rate: 0, enabled: false },
  discountTypes: { pkr: true, percent: true },
  maxDiscountPct: 100,
  maxDiscountPkr: 0
};
let taxUnsaved = false;

// ── HELPERS ────────────────────────────────────────────
function showToast(msg,type='info'){const wrap=document.getElementById('toast-wrap');const t=document.createElement('div');t.className='toast '+type;t.innerHTML='<span>'+(type==='success'?'✓':type==='error'?'✕':'ℹ')+'</span> '+msg;wrap.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},3500);}
function setLoading(on){document.getElementById('loading-overlay').style.display=on?'flex':'none';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function avatarLetter(name){return(name||'?')[0].toUpperCase();}
function avatarColor(name){let h=0;for(let c of(name||''))h=(h*31+c.charCodeAt(0))%8;return AV_COLORS[h];}
function genWaiterId(){return 'W-'+Math.random().toString(36).substr(2,6).toUpperCase();}
function formatDate(iso){if(!iso)return 'Never';const d=new Date(iso);return d.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'});}

// ── LOAD ───────────────────────────────────────────────
function setLoadMsg(msg){const el=document.getElementById('loading-msg');if(el)el.textContent=msg;}

async function loadAll(){
  try{
    setLoadMsg('Loading restaurant settings...');
    const snap=await getDoc(doc(db,'settings','restaurant'));
    if(snap.exists()){
      restaurantSettings=snap.data();
      document.getElementById('sb-name').textContent=restaurantSettings.name||'Restaurant';
      document.getElementById('topbar-sub').textContent=(restaurantSettings.name||'Restaurant')+' · Admin Panel';
      document.getElementById('badge-settings').style.display='inline';
    }
    setLoadMsg('Loading menu items...');
    await loadMenuItems();
    setLoadMsg('Loading waiter accounts...');
    await loadWaiters();
    setLoadMsg('Loading tax settings...');
    await loadTaxSettings();
    setLoadMsg('Done ✓');
  }catch(e){
    showToast('Partial load error: '+e.message,'info');
  }
}
async function loadMenuItems(){const q=query(collection(db,'menuItems'),orderBy('serialNo','asc'));const snap=await getDocs(q);menuItems=[];snap.forEach(d=>menuItems.push({id:d.id,...d.data()}));nextSerial=menuItems.length>0?Math.max(...menuItems.map(i=>i.serialNo||0))+1:1;if(menuItems.length>0)document.getElementById('badge-menu').style.display='inline';}
async function loadWaiters(){const q=query(collection(db,'waiters'),orderBy('createdAt','asc'));const snap=await getDocs(q);waiters=[];snap.forEach(d=>waiters.push({id:d.id,...d.data()}));if(waiters.length>0)document.getElementById('badge-waiters').style.display='inline';}

async function loadTaxSettings(){
  try{
    const snap=await getDoc(doc(db,'settings','taxDiscount'));
    if(snap.exists()){taxSettings={...taxSettings,...snap.data()};document.getElementById('badge-taxes').style.display='inline';}
  }catch(e){/* use defaults */}
}

// ══════════════════════════════════════════════════════
// SECTION 4 — TAX & DISCOUNT
// ══════════════════════════════════════════════════════
function renderTaxPage(){
  const c=document.getElementById('page-content');
  c.innerHTML=
    '<div class="page-header">'+
      '<div><div class="page-eyebrow">Admin Panel · Section 4 of 6</div>'+
      '<div class="page-title">Tax & Discount Settings</div>'+
      '<div class="page-desc">Define the 3 tax buttons shown to the waiter. Set discount rules. All changes apply immediately to new bills.</div></div>'+
      '<div style="display:flex;align-items:center;gap:12px;">'+
        '<span id="tax-status" class="'+(taxUnsaved?'status-unsaved':'status-saved')+'">'+(taxUnsaved?'Unsaved changes':'All changes saved')+'</span>'+
        '<button class="btn btn-primary" id="tax-save-btn" onclick="saveTaxSettings()">💾 Save Settings</button>'+
      '</div>'+
    '</div>'+

    /* ── 3 TAX BUTTONS ── */
    '<div class="card">'+
      '<div class="card-header"><span class="card-header-icon">🏷️</span>'+
        '<div><div class="card-header-title">3 Tax Buttons</div>'+
        '<div class="card-header-sub">Each button appears on the waiter order screen. Waiter selects one to apply to the bill.</div></div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="tax-cards" id="tax-cards-container"></div>'+
        '<div style="margin-top:14px;padding:12px 16px;background:#EBF3FF;border-radius:8px;font-size:0.78rem;color:#1A4A7A;">'+
          '<strong>How it works:</strong> All <strong>enabled</strong> taxes are applied automatically to every bill. Waiter sees a full tax breakdown (e.g. GST 5% + Service Tax 3%). Disabled taxes are ignored.'+
        '</div>'+
      '</div>'+
    '</div>'+

    /* ── DISCOUNT SETTINGS ── */
    '<div class="card">'+
      '<div class="card-header"><span class="card-header-icon">💸</span>'+
        '<div><div class="card-header-title">Discount Settings</div>'+
        '<div class="card-header-sub">Control what types of discounts waiter can apply on the order screen.</div></div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div style="margin-bottom:16px;"><div class="form-label" style="margin-bottom:10px;">Allow Discount Types</div>'+
        '<div class="discount-row" id="disc-type-row"></div></div>'+
        '<div class="form-grid" style="margin-top:16px;">'+
          '<div class="form-group">'+
            '<label class="form-label">Max Discount % Allowed</label>'+
            '<div style="display:flex;align-items:center;gap:8px;">'+
              '<input id="d-maxpct" class="form-input" type="number" min="0" max="100" value="'+esc(taxSettings.maxDiscountPct)+'" style="width:100px;" oninput="markTaxUnsaved()"/>'+
              '<span style="font-size:0.82rem;color:#6B7C93;">% &nbsp;(0 = no limit)</span>'+
            '</div>'+
            '<span class="form-hint">Waiter cannot give more than this % discount. Set 0 for no limit.</span>'+
          '</div>'+
          '<div class="form-group">'+
            '<label class="form-label">Max Discount PKR Allowed</label>'+
            '<div style="display:flex;align-items:center;gap:8px;">'+
              '<input id="d-maxpkr" class="form-input" type="number" min="0" value="'+esc(taxSettings.maxDiscountPkr)+'" style="width:130px;" oninput="markTaxUnsaved()"/>'+
              '<span style="font-size:0.82rem;color:#6B7C93;">PKR &nbsp;(0 = no limit)</span>'+
            '</div>'+
            '<span class="form-hint">Waiter cannot give more than this PKR discount. Set 0 for no limit.</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    /* ── LIVE BILL SIMULATOR ── */
    '<div class="card">'+
      '<div class="card-header"><span class="card-header-icon">🧮</span>'+
        '<div><div class="card-header-title">Live Bill Simulator</div>'+
        '<div class="card-header-sub">Test how tax and discount will appear on a real bill</div></div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="bill-sim">'+
          '<div class="bill-sim-title">Simulate a Bill</div>'+
          '<div class="sim-input-row">'+
            '<div class="sim-input-group"><span class="sim-label">Bill Amount (PKR)</span><input id="sim-amount" class="sim-input" type="number" value="2600" oninput="updateSimulator()"/></div>'+
            '<div class="sim-input-group"><span class="sim-label">PKR Discount</span><input id="sim-disc-pkr" class="sim-input" type="number" value="0" min="0" placeholder="e.g. 200" oninput="updateSimulator()"/></div>'+
            '<div class="sim-input-group"><span class="sim-label">% Discount</span><input id="sim-disc-pct" class="sim-input" type="number" value="0" min="0" max="100" placeholder="e.g. 10" oninput="updateSimulator()"/></div>'+
          '</div>'+
          '<div style="font-size:0.75rem;color:#6B7C93;margin-bottom:12px;">All enabled taxes apply automatically. Both discounts can be used together.</div>'+
          '<div id="sim-result"></div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div class="btn-row" style="justify-content:flex-end;">'+
      '<button class="btn btn-primary" style="padding:10px 28px;" onclick="saveTaxSettings()">💾 Save All Settings</button>'+
    '</div>';

  renderTaxCards();
  renderDiscountTypes();
  updateSimulator();
}

function renderTaxCards(){
  const c=document.getElementById('tax-cards-container'); if(!c) return;
  c.innerHTML=['tax1','tax2','tax3'].map((key,i)=>{
    const t=taxSettings[key]||{name:'',rate:0,enabled:false};
    return '<div class="tax-card '+(t.enabled?'active-tax':'')+'" id="taxcard-'+key+'">'+
      '<div class="tax-card-head">'+
        '<span class="tax-num">Tax Button '+(i+1)+'</span>'+
        '<label class="toggle"><input type="checkbox" '+(t.enabled?'checked':'')+' onchange="toggleTax(\''+key+'\',this.checked)"/><span class="toggle-slider"></span></label>'+
      '</div>'+
      '<div class="tax-card-body">'+
        '<div class="form-group" style="margin-bottom:12px;">'+
          '<label class="form-label">Button Label</label>'+
          '<input class="form-input" id="'+key+'-name" placeholder="e.g. GST" value="'+esc(t.name)+'" oninput="updateTaxField(\''+key+'\',\'name\',this.value)"/>'+
          '<span class="form-hint">Name shown on waiter screen button</span>'+
        '</div>'+
        '<div class="form-group">'+
          '<label class="form-label">Tax Rate (%)</label>'+
          '<div style="display:flex;align-items:center;gap:8px;">'+
            '<input class="form-input" id="'+key+'-rate" type="number" min="0" max="100" step="0.1" placeholder="e.g. 5" value="'+esc(t.rate)+'" style="width:90px;" oninput="updateTaxField(\''+key+'\',\'rate\',this.value)"/>'+
            '<span style="font-size:0.82rem;color:#6B7C93;">%</span>'+
          '</div>'+
        '</div>'+
        '<div class="tax-preview-btn" id="'+key+'-preview">'+
          (t.enabled&&t.name ? esc(t.name)+' '+esc(t.rate)+'%' : '— Disabled —')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

window.toggleTax = function(key,enabled){
  taxSettings[key]={...taxSettings[key],enabled};
  markTaxUnsaved();
  const card=document.getElementById('taxcard-'+key);
  if(card) card.classList.toggle('active-tax',enabled);
  updatePreviewBtn(key);
  updateSimulator();
};

window.updateTaxField = function(key,field,val){
  taxSettings[key]={...taxSettings[key],[field]:field==='rate'?parseFloat(val)||0:val};
  markTaxUnsaved();
  updatePreviewBtn(key);
  updateSimulator();
};

function updatePreviewBtn(key){
  const t=taxSettings[key];
  const el=document.getElementById(key+'-preview');
  if(el) el.textContent = t.enabled&&t.name ? t.name+' '+t.rate+'%' : '— Disabled —';
}

function renderDiscountTypes(){
  const c=document.getElementById('disc-type-row'); if(!c) return;
  c.innerHTML='';

  const types=[
    {key:'pkr',icon:'💵',title:'PKR Flat Amount',desc:'Waiter enters a fixed PKR amount to deduct from bill total.<br/>e.g. PKR 200 off'},
    {key:'percent',icon:'📊',title:'Percentage %',desc:'Waiter enters a % to deduct from bill total.<br/>e.g. 10% off'}
  ];
  types.forEach(t=>{
    const enabled=taxSettings.discountTypes&&taxSettings.discountTypes[t.key];
    const card=document.createElement('div');
    card.className='discount-type-card '+(enabled?'selected':'');
    card.id='disc-'+t.key;
    card.innerHTML=
      '<div class="disc-icon">'+t.icon+'</div>'+
      '<div class="disc-title">'+t.title+'</div>'+
      '<div class="disc-desc">'+t.desc+'</div>'+
      '<div style="margin-top:12px;"><span style="font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:10px;background:'+(enabled?'#EAFAF1':'#FDEDEC')+';color:'+(enabled?'#1A7A4E':'#C0392B')+'">'+( enabled?'● Enabled':'● Disabled')+'</span></div>';
    card.addEventListener('click',()=>toggleDiscType(t.key));
    c.appendChild(card);
  });
}

window.toggleDiscType = function(type){
  taxSettings.discountTypes={...taxSettings.discountTypes,[type]:!taxSettings.discountTypes[type]};
  markTaxUnsaved();
  renderDiscountTypes();
  updateSimulator();
};

function markTaxUnsaved(){
  taxUnsaved=true;
  const el=document.getElementById('tax-status');
  if(el){el.className='status-unsaved';el.textContent='Unsaved changes';}
}

window.updateSimulator = function(){
  const amount  = parseFloat(document.getElementById('sim-amount')?.value)||0;
  const discPkr = parseFloat(document.getElementById('sim-disc-pkr')?.value)||0;
  const discPct = parseFloat(document.getElementById('sim-disc-pct')?.value)||0;

  let subtotal = amount;

  // Apply PKR discount first
  const pkrDisc = Math.min(discPkr, subtotal);
  const afterPkr = subtotal - pkrDisc;

  // Apply % discount on remaining
  const pctDisc = Math.round(afterPkr * (Math.min(discPct,100)/100) * 100)/100;
  const afterDisc = afterPkr - pctDisc;

  // Apply ALL enabled taxes
  let taxRows = '';
  let totalTax = 0;
  ['tax1','tax2','tax3'].forEach(key => {
    const t = taxSettings[key];
    if (t && t.enabled && t.name && t.rate > 0) {
      const taxAmt = Math.round(afterDisc * (t.rate/100) * 100)/100;
      totalTax += taxAmt;
      taxRows += '<div class="sim-row tax"><span>'+esc(t.name)+' ('+t.rate+'%)</span><span>+ PKR '+taxAmt.toLocaleString()+'</span></div>';
    }
  });

  const grandTotal = Math.round(afterDisc + totalTax);
  const el = document.getElementById('sim-result'); if(!el) return;

  el.innerHTML =
    '<div class="sim-row"><span>Subtotal</span><span>PKR '+subtotal.toLocaleString()+'</span></div>'+
    (pkrDisc>0 ? '<div class="sim-row discount"><span>PKR Discount</span><span>− PKR '+pkrDisc.toLocaleString()+'</span></div>' : '')+
    (pctDisc>0 ? '<div class="sim-row discount"><span>% Discount ('+discPct+'%)</span><span>− PKR '+pctDisc.toLocaleString()+'</span></div>' : '')+
    taxRows+
    '<div class="sim-row total"><span>GRAND TOTAL</span><span>PKR '+grandTotal.toLocaleString()+'</span></div>';
};

window.saveTaxSettings = async function(){

    if(t.enabled){
      if(!t.name.trim()){showToast('Tax '+(key==='tax1'?1:key==='tax2'?2:3)+' name is required when enabled','error');return;}

function collectModifiers(){
  const mods=[];
  document.querySelectorAll('[id^="mod-name-"]').forEach(el=>{
    const idx=el.id.replace('mod-name-','');
    const name=el.value.trim();
    const optsEl=document.getElementById('mod-opts-'+idx);
    const options=(optsEl?.value||'').split(',').map(o=>o.trim()).filter(Boolean);
    if(name) mods.push({name,options});
  });
  return mods;
}

window.saveMenuItem=async function(){
  const serialNo=parseInt(document.getElementById('m-serial').value);
  const name=document.getElementById('m-name').value.trim();
  const category=document.getElementById('m-category').value;
  const price=parseFloat(document.getElementById('m-price').value);
  const kitchen=document.getElementById('m-kitchen').value;
  const description=document.getElementById('m-desc').value.trim();
  const isActive=document.getElementById('m-active').checked;
  const isSpicy=document.getElementById('m-spicy').checked;
  const isVeg=document.getElementById('m-veg').checked;
  const hasSize=document.getElementById('m-hassize').checked;
  const modifiers=collectModifiers();

  // Photo
  const imgEl=document.querySelector('#photo-upload-area img');
  const photo=imgEl?imgEl.src:(editingMenuItem?.photo||'');

  // Sizes
  let sizes=[];
  if(hasSize){
    const s=parseFloat(document.getElementById('m-price-s')?.value)||0;
    const m=parseFloat(document.getElementById('m-price-m')?.value)||0;
    const l=parseFloat(document.getElementById('m-price-l')?.value)||0;
    sizes=[s,m,l];
  }

  if(!serialNo||serialNo<1){showToast('Serial number required','error');return;}
  if(!name){showToast('Item name required','error');return;}
  if(!price||price<0){showToast('Valid price required','error');return;}
  const dup=menuItems.find(i=>i.serialNo===serialNo&&(!editingMenuItem||i.id!==editingMenuItem.id));
  if(dup){showToast('Serial '+serialNo+' already used by "'+dup.name+'"','error');return;}

  const btn=document.getElementById('menu-save-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Saving...';}
  try{
    const data={serialNo,name,category,price,kitchen,description,isActive,isSpicy,isVeg,hasSize,sizes,modifiers,photo,updatedAt:new Date().toISOString()};
    if(editingMenuItem){await updateDoc(doc(db,'menuItems',editingMenuItem.id),data);showToast('Item updated!','success');}
    else{data.createdAt=new Date().toISOString();await addDoc(collection(db,'menuItems'),data);showToast('Item added!','success');}
    closeMenuModal();await loadMenuItems();document.getElementById('badge-menu').style.display='inline';applyFilter();
  }catch(e){showToast('Save failed: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent=editingMenuItem?'💾 Save Changes':'➕ Add Item';}}
};

window.changeTableCount=function(id,delta){
  const hall=hallsData.halls.find(h=>h.id===id);if(!hall)return;
  const n=Math.min(50,Math.max(1,(hall.tables||20)+delta));
  hall.tables=n;
  const pad=String(n).padStart(2,'0');
  const cnt=document.getElementById('tcount-'+id);if(cnt)cnt.textContent=n;
  const stat=document.getElementById('stat-'+id);if(stat)stat.textContent=n;
  const hint=document.getElementById('hfooter-'+id);if(hint)hint.textContent='T-01 to T-'+pad;
  const sub=document.getElementById('hdr-sub-'+id);if(sub)sub.textContent=n+' tables · T-01 to T-'+pad;
  const total=hallsData.halls.reduce((s,h)=>s+(h.tables||0),0);
  const totalEl=document.getElementById('total-tables-stat');if(totalEl)totalEl.textContent=total;
  refreshPreview();
};

async function loadDeliveryBills(){

    allDeliveryBills = [];
    snap.forEach(d => allDeliveryBills.push({id:d.id,...d.data(),_type:'delivery'}));
  }catch(e){}

function getBillsForDate(dateStr){
  const start = new Date(dateStr); start.setHours(0,0,0,0);
  const end   = new Date(dateStr); end.setHours(23,59,59,999);
  const dinein = allBills.filter(b=>{
    if(b.status!=='paid') return false;
    const d = new Date(b.closedAt||b.updatedAt);
    return d>=start && d<=end;
  }).map(b=>({...b,_type:'dinein'}));
  const delivery = allDeliveryBills.filter(b=>{
    if(b.status!=='dispatched') return false;
    const d = new Date(b.closedAt||b.updatedAt);
    return d>=start && d<=end;
  });
  return [...dinein,...delivery];
}

function calcReportStats(bills){
  const today = new Date(); today.setHours(0,0,0,0);
  const week  = new Date(today); week.setDate(week.getDate()-6);
  const month = new Date(today); month.setDate(1);
  let todaySales=0,todayCount=0,weekSales=0,weekCount=0,monthSales=0,monthCount=0,allSales=0;
  const itemMap={}, hallMap={};
  bills.forEach(b=>{
    if(b.status==='cancelled') return;
    const total=b.grandTotal||0;
    const d=new Date(b.createdAt);
    allSales+=total;
    if(d>=today){todaySales+=total;todayCount++;}
    if(d>=week){weekSales+=total;weekCount++;}
    if(d>=month){monthSales+=total;monthCount++;}
    (b.items||[]).filter(i=>!i.cancelled).forEach(i=>{
      if(!itemMap[i.name]) itemMap[i.name]={name:i.name,qty:0,revenue:0};
      itemMap[i.name].qty+=i.qty||1;
      itemMap[i.name].revenue+=(i.qty||1)*(i.unitPrice||0);
    });
    if(b.hall){
      if(!hallMap[b.hall]) hallMap[b.hall]={count:0,revenue:0};
      hallMap[b.hall].count++;hallMap[b.hall].revenue+=total;
    }
  });
  return {todaySales,todayCount,weekSales,weekCount,monthSales,monthCount,allSales,
    totalBills:bills.length,
    topItems:Object.values(itemMap).sort((a,b)=>b.qty-a.qty).slice(0,8),
    topHalls:Object.entries(hallMap).map(([k,v])=>({hall:k,...v})).sort((a,b)=>b.revenue-a.revenue)
  };
}

function getFilteredBills(){
  return allBills.filter(b=>{
    const matchStatus = billFilter==='all'||b.status===billFilter;
    const q=billSearch.toLowerCase();
    const matchSearch = !q||
      String(b.billToken||'').toLowerCase().includes(q)||
      String(b.tableNo||'').toLowerCase().includes(q)||
      String(b.hall||'').toLowerCase().includes(q)||
      String(b.waiterName||'').toLowerCase().includes(q)||
      String(b.customerWhatsapp||'').toLowerCase().includes(q);
    let matchDate=true;
    if(billDateFrom||billDateTo){
      const d=new Date(b.createdAt);
      if(billDateFrom && d<new Date(billDateFrom)) matchDate=false;
      if(billDateTo && d>new Date(billDateTo+'T23:59:59')) matchDate=false;
    }
    return matchStatus&&matchSearch&&matchDate;
  });
}

function renderBillsTable(){
  const filtered=getFilteredBills();
  if(filtered.length===0){
    return '<div class="empty-state"><div class="empty-icon">🧾</div>'+
      '<div class="empty-title">'+(allBills.length===0?'No bills yet':'No bills match your filters')+'</div>'+
      '<div class="empty-desc">'+(allBills.length===0?'Bills will appear here once waiters start taking orders.':'Try clearing the filters.')+'</div></div>';
  }
  const statusStyle={open:'background:#FEF9E7;color:#856404;',paid:'background:#EAFAF1;color:#1A7A4E;',closed:'background:#EAFAF1;color:#1A7A4E;',cancelled:'background:#FDEDEC;color:#C0392B;'};
  return '<table class="menu-table">'+
    '<thead><tr><th>Bill #</th><th>Hall · Table</th><th>Waiter</th><th>Items</th><th>Total</th><th>Status</th><th>Date & Time</th><th>Action</th></tr></thead>'+
    '<tbody>'+
    filtered.map(b=>{
      const ss=statusStyle[b.status]||'background:#F0F4F8;color:#4A5568;';
      const d=new Date(b.createdAt);
      const dateStr=d.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'});
      const timeStr=d.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
      return '<tr style="cursor:pointer;" onclick="viewBillDetail(\''+b.id+'\')">'+
        '<td><span style="font-weight:700;font-family:monospace;color:#2D7DD2;">#'+esc(b.billToken||b.id.substr(0,6).toUpperCase())+'</span></td>'+
        '<td><span style="font-weight:600;">'+esc(b.hall||'—')+'</span><br/><span style="font-size:0.75rem;color:#6B7C93;">'+esc(b.tableNo||'—')+'</span></td>'+
        '<td style="font-size:0.82rem;">'+esc(b.waiterName||'—')+'</td>'+
        '<td style="font-size:0.82rem;color:#6B7C93;">'+(b.items?.length||0)+' items</td>'+
        '<td class="price-cell">PKR '+Number(b.grandTotal||0).toLocaleString()+'</td>'+
        '<td><span style="font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:10px;'+ss+'">'+esc(b.status||'—')+'</span></td>'+
        '<td style="font-size:0.78rem;color:#6B7C93;">'+dateStr+'<br/>'+timeStr+'</td>'+
        '<td><button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();viewBillDetail(\''+b.id+'\')">👁 View</button></td>'+

    }).join('')+

window.setBillFilter=function(val){

async function loadInventory(){
  try{
    const snap=await getDocs(query(collection(db,'inventory'),orderBy('name','asc')));
    inventoryItems=[];
    snap.forEach(d=>inventoryItems.push({id:d.id,...d.data()}));
    updateLowStockBadge();
  }catch(e){showToast('Inventory load error: '+e.message,'error');}
}
async function loadRecipes(){
  try{
    const snap=await getDocs(query(collection(db,'recipes'),orderBy('createdAt','asc')));
    recipes=[];
    snap.forEach(d=>recipes.push({id:d.id,...d.data()}));
  }catch(e){showToast('Recipe load error: '+e.message,'error');}
}
function updateLowStockBadge(){
  const low=inventoryItems.filter(i=>(i.currentStock||0)<=(i.minLevel||0));
  const badge=document.getElementById('badge-inventory');
  if(badge){
    badge.textContent=low.length>0?low.length+'!':'✓';
    badge.style.display=low.length>0?'inline':'none';
  }
}
function getStockStatus(item){
  const s=item.currentStock||0,m=item.minLevel||0;
  if(s<=0)return 'critical';
  if(s<=m)return 'low';
  return 'ok';
}
function getStockPct(item){
  const s=item.currentStock||0,cap=Math.max(item.maxLevel||s*2,1);
  return Math.min(100,Math.round(s/cap*100));
}

function invKPI(label,val,sub,color){
  return '<div class="card" style="border-top:3px solid '+color+';padding:12px 16px;">'+
    '<div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#6B7C93;margin-bottom:4px;">'+label+'</div>'+
    '<div style="font-size:1.4rem;font-weight:800;color:'+color+';">'+val+'</div>'+
    '<div style="font-size:0.72rem;color:#6B7C93;">'+sub+'</div>'+
  '</div>';
}

function renderInvGrid(){
  const grid=document.getElementById('inv-grid');if(!grid)return;
  let items=[...inventoryItems];
  if(invFilter==='⚠️ Low')items=items.filter(i=>getStockStatus(i)==='low');
  else if(invFilter==='🚨 Critical')items=items.filter(i=>getStockStatus(i)==='critical');
  else if(invFilter!=='All')items=items.filter(i=>i.category===invFilter);
  if(invSearch)items=items.filter(i=>i.name.toLowerCase().includes(invSearch.toLowerCase()));
  grid.innerHTML='';
  if(items.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6B7C93;font-size:0.85rem;">No ingredients found.</div>';
    return;
  }
  items.forEach(item=>{
    const status=getStockStatus(item);
    const pct=getStockPct(item);
    const barColor=status==='ok'?'#27AE60':status==='low'?'#F4A736':'#E74C3C';
    const stockColor=status==='ok'?'#27AE60':status==='low'?'#C9A84C':'#E74C3C';
    const card=document.createElement('div');
    card.className='inv-card '+status;
    card.innerHTML=
      '<div class="inv-card-header">'+
        '<div>'+
          '<div class="inv-card-name">'+esc(item.name)+'</div>'+
          '<div class="inv-card-cat">'+esc(item.category||'Other')+' · '+esc(item.supplier||'—')+'</div>'+
        '</div>'+
        '<span class="inv-badge '+status+'">'+(status==='ok'?'✓ OK':status==='low'?'⚠️ Low':'🚨 Critical')+'</span>'+
      '</div>'+
      '<div class="inv-stock-display">'+
        '<span class="inv-stock-num" style="color:'+stockColor+';">'+(item.currentStock||0)+'</span>'+
        '<span class="inv-stock-unit">'+esc(item.unit||'')+'</span>'+
      '</div>'+
      '<div class="inv-stock-bar">'+
        '<div class="inv-stock-bar-fill" style="width:'+pct+'%;background:'+barColor+';"></div>'+

async function saveInvItem(){
  const name=document.getElementById('inv-name').value.trim();
  const unit=document.getElementById('inv-unit').value;

  const data={
    name,
    category:document.getElementById('inv-cat').value,

    minLevel:parseFloat(document.getElementById('inv-min').value)||0,
    maxLevel:parseFloat(document.getElementById('inv-max').value)||0,

    updatedAt:new Date().toISOString()
  };
  const btn=document.getElementById('inv-save-btn');
  btn.disabled=true;btn.textContent='⏳';
  try{
    if(editingInvItem){
      await updateDoc(doc(db,'inventory',editingInvItem.id),data);

    }else{
      data.createdAt=new Date().toISOString();

  }
}

window.applyStockAdj=async function(id){
  const item=inventoryItems.find(i=>i.id===id);if(!item)return;
  const type=document.getElementById('adj-type').value;
  const qty=parseFloat(document.getElementById('adj-qty').value)||0;
  const note=document.getElementById('adj-note').value.trim();
  if(qty<=0){showToast('Enter a valid quantity','error');return;}
  let newStock=item.currentStock||0;
  if(type==='in')newStock+=qty;
  else if(type==='waste')newStock=Math.max(0,newStock-qty);
  else if(type==='correction')newStock=qty;
  try{
    await updateDoc(doc(db,'inventory',id),{currentStock:newStock,updatedAt:new Date().toISOString()});
    await addDoc(collection(db,'stockMovements'),{inventoryId:id,ingredientName:item.name,type,qty,note,previousStock:item.currentStock,newStock,createdAt:new Date().toISOString()});
    showToast('Stock updated: '+newStock+' '+item.unit,'success');
    document.getElementById('adj-modal')?.remove();
    await loadInventory();renderInventoryPage();
  }catch(e){showToast('Error: '+e.message,'error');}
};

function calcRecipeCost(recipe){
  return (recipe.ingredients||[]).reduce((sum,ing)=>{
    const invItem=inventoryItems.find(i=>i.id===ing.inventoryId);
    return sum+(invItem?(ing.qty||0)*(invItem.purchasePrice||0):0);
  },0);
}

function calcDraftCost(){
  return recipeDraft.ingredients.reduce((sum,ing)=>{
    const item=inventoryItems.find(i=>i.id===ing.inventoryId);
    return sum+(item?(ing.qty||0)*(item.purchasePrice||0):0);
  },0);
}

function renderSizeMultipliers(category){
  const section=document.getElementById('rb-size-section');
  const container=document.getElementById('rb-size-multipliers');
  if(!section||!container)return;
  const sizeType=RECIPE_SIZE_TYPES[category];
  if(!sizeType){
    section.style.display='none';
    return;
  }
  section.style.display='block';
  // Ensure recipeDraft.multipliers exists
  if(!recipeDraft.multipliers)recipeDraft.multipliers={};
  const baseLbl=sizeType.labels[0];
  let html='<div style="display:flex;flex-direction:column;gap:10px;">';
  // Base row (locked at 1.0)
  html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:#F5F8FC;border-radius:8px;">'+
    '<div style="flex:1;font-size:0.85rem;font-weight:600;color:#0D1B2A;">'+esc(baseLbl)+' <span style="font-size:0.7rem;color:#6B7C93;">(base)</span></div>'+
    '<div style="display:flex;align-items:center;gap:8px;">'+
      '<span style="font-size:0.78rem;color:#6B7C93;">× </span>'+
      '<div style="background:#E2EAF4;border-radius:7px;padding:6px 14px;font-size:0.88rem;font-weight:700;color:#6B7C93;">1.0 (fixed)</div>'+
    '</div>'+
  '</div>';
  // Other size rows
  sizeType.keys.forEach((key,ki)=>{
    const lbl=sizeType.labels[ki+1];
    const val=recipeDraft.multipliers[key]||'';
    html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:#EBF3FF;border-radius:8px;">'+
      '<div style="flex:1;font-size:0.85rem;font-weight:600;color:#0D1B2A;">'+esc(lbl)+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px;">'+
        '<span style="font-size:0.78rem;color:#6B7C93;">× </span>'+
        '<input id="rb-mult-'+esc(key)+'" class="form-input" type="number" min="0.1" step="0.01" style="width:90px;text-align:center;font-weight:700;" placeholder="e.g. 1.8" value="'+val+'" oninput="recipeDraft.multipliers[\''+key+'\']= parseFloat(this.value)||1;refreshRbPanels();"/>'+
      '</div>'+
      '<div style="font-size:0.72rem;color:#6B7C93;" id="rb-mult-cost-'+esc(key)+'"></div>'+
    '</div>';
  });
  html+='<div style="font-size:0.72rem;color:#6B7C93;padding:4px 2px;">ℹ️ Set multiplier based on how much more a larger size uses. e.g. Full Karahi uses 1.8× the ingredients of Half.</div>';
  html+='</div>';
  container.innerHTML=html;
}

function refreshRbPanels(){
  const menuItem=menuItems.find(m=>m.id===recipeDraft.menuItemId);
  const totalCost=calcDraftCost();
  const sellingPrice=menuItem?.price||0;
  const margin=sellingPrice>0?Math.round((sellingPrice-totalCost)/sellingPrice*100):0;
  const marginW=Math.min(100,Math.max(0,margin));
  const costPanel=document.getElementById('rb-cost-panel');
  if(costPanel){
    let html='';
    recipeDraft.ingredients.forEach(ing=>{
      const item=inventoryItems.find(i=>i.id===ing.inventoryId);
      const cost=(ing.qty||0)*(item?.purchasePrice||0);
      html+='<div class="cb-row"><span class="cb-label">'+esc(item?.name||'?')+' × '+ing.qty+' '+esc(item?.unit||'')+'</span><span class="cb-value cost">PKR '+cost.toFixed(2)+'</span></div>';
    });
    if(recipeDraft.ingredients.length===0)html='<div class="cb-row"><span class="cb-label" style="font-style:italic;">Add ingredients above</span></div>';
    html+='<div class="cb-row"><span class="cb-label">Total Recipe Cost</span><span class="cb-value cost">PKR '+totalCost.toFixed(2)+'</span></div>';
    html+='<div class="cb-row"><span class="cb-label">Selling Price</span><span class="cb-value">PKR '+(sellingPrice||0)+'</span></div>';
    html+='<div class="margin-bar"><div class="margin-bar-fill" style="width:'+marginW+'%;"></div></div>';
    html+='<div class="cb-row"><span>PROFIT MARGIN</span><span class="cb-value profit">'+(margin>0?margin+'%':'—')+'</span></div>';
    costPanel.innerHTML=html;
  }
  const pq=parseInt(document.getElementById('rb-preview-qty')?.value)||10;
  const spPanel=document.getElementById('rb-stock-preview');
  if(spPanel){
    if(recipeDraft.ingredients.length===0){
      spPanel.innerHTML='<div style="color:#6B7C93;font-size:0.8rem;text-align:center;padding:12px;">Add ingredients to see stock preview.</div>';
    }else{
      let html='<div class="stock-preview"><div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#1A4A7A;margin-bottom:10px;">📊 Making '+pq+' portions</div>';
      recipeDraft.ingredients.forEach(ing=>{
        const item=inventoryItems.find(i=>i.id===ing.inventoryId);
        const needed=(ing.qty||0)*pq;
        const avail=item?.currentStock||0;
        const ok=avail>=needed;
        html+='<div class="sp-row '+(ok?'ok':'warn')+'">'+
          '<span>'+esc(item?.name||'?')+'</span>'+
          '<span>'+(ok?'✅':'⚠️')+' Need: '+needed.toFixed(2)+' '+esc(item?.unit||'')+' · Have: '+avail+'</span>'+
        '</div>';
      });
      html+='</div>';
      spPanel.innerHTML=html;
    }
  }
}

function renderIngList(){
  const el=document.getElementById('ing-list');if(!el)return;
  el.innerHTML='';
  if(recipeDraft.ingredients.length===0){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#6B7C93;font-size:0.82rem;">No ingredients yet. Search above to add.</div>';
    return;
  }
  recipeDraft.ingredients.forEach((ing,idx)=>{
    const item=inventoryItems.find(i=>i.id===ing.inventoryId);
    const itemCost=(ing.qty||0)*(item?.purchasePrice||0);
    const row=document.createElement('div');row.className='ing-row';
    row.innerHTML=
      '<div style="flex:1;min-width:0;">'+
        '<div class="ing-name">'+esc(item?.name||'Unknown')+'</div>'+
        '<div class="ing-cost">PKR '+itemCost.toFixed(2)+'</div>'+
      '</div>'+
      '<div class="ing-unit">'+esc(item?.unit||'')+'</div>';
    const qc=document.createElement('div');qc.className='ing-qty-ctrl';
    const bm01=document.createElement('button');bm01.className='ing-qty-btn';bm01.textContent='-0.01';
    const bm1=document.createElement('button');bm1.className='ing-qty-btn';bm1.textContent='-0.1';
    const qi=document.createElement('input');qi.className='ing-qty-input';qi.type='number';qi.min='0';qi.step='0.01';qi.value=ing.qty||0;
    const bp1=document.createElement('button');bp1.className='ing-qty-btn';bp1.textContent='+0.1';
    const bp10=document.createElement('button');bp10.className='ing-qty-btn';bp10.textContent='+1';
    bm01.addEventListener('click',()=>{ing.qty=Math.max(0,Math.round((ing.qty-0.01)*1000)/1000);renderIngList();refreshRbPanels();});
    bm1.addEventListener('click',()=>{ing.qty=Math.max(0,Math.round((ing.qty-0.1)*1000)/1000);renderIngList();refreshRbPanels();});
    bp1.addEventListener('click',()=>{ing.qty=Math.round((ing.qty+0.1)*1000)/1000;renderIngList();refreshRbPanels();});
    bp10.addEventListener('click',()=>{ing.qty=Math.round((ing.qty+1)*1000)/1000;renderIngList();refreshRbPanels();});
    qi.addEventListener('input',function(){ing.qty=Math.max(0,parseFloat(this.value)||0);refreshRbPanels();});
    qc.appendChild(bm01);qc.appendChild(bm1);qc.appendChild(qi);qc.appendChild(bp1);qc.appendChild(bp10);
    const bdel=document.createElement('button');bdel.className='ing-del';bdel.textContent='🗑';
    bdel.addEventListener('click',()=>{recipeDraft.ingredients.splice(idx,1);renderIngList();refreshRbPanels();});
    row.appendChild(qc);row.appendChild(bdel);
    el.appendChild(row);
  });
}

function showIngSearchDropdown(val){
  const el=document.getElementById('rb-ing-results');if(!el)return;
  if(!val){el.style.display='none';return;}
  const q=val.toLowerCase();
  const matches=inventoryItems.filter(i=>i.name.toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)).slice(0,8);
  el.style.display='block';el.innerHTML='';
  if(matches.length===0){
    el.innerHTML='<div style="padding:10px 14px;font-size:0.8rem;color:#6B7C93;">No ingredients found. Add them in Inventory first.</div>';
    return;
  }
  matches.forEach(item=>{
    const already=recipeDraft.ingredients.some(i=>i.inventoryId===item.id);
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #F0F4F8;cursor:pointer;';
    row.onmouseover=()=>row.style.background='#F5F9FF';
    row.onmouseout=()=>row.style.background='white';
    const info=document.createElement('div');info.style.flex='1';
    info.innerHTML='<div style="font-size:0.85rem;font-weight:600;">'+esc(item.name)+'</div>'+
      '<div style="font-size:0.72rem;color:#6B7C93;">'+esc(item.category||'')+' · Stock: '+(item.currentStock||0)+' '+esc(item.unit||'')+' · PKR '+(item.purchasePrice||0)+'/'+esc(item.unit||'')+'</div>';
    row.appendChild(info);
    if(already){
      const tag=document.createElement('span');tag.style.cssText='font-size:0.72rem;color:#27AE60;font-weight:600;';tag.textContent='✓ Added';row.appendChild(tag);
    }else{
      const btn=document.createElement('button');
      btn.style.cssText='background:#2D7DD2;color:white;border:none;border-radius:6px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;';
      btn.textContent='+ Add';
      btn.addEventListener('click',()=>{
        recipeDraft.ingredients.push({inventoryId:item.id,qty:1});
        const si=document.getElementById('rb-ing-search');if(si)si.value='';
        el.style.display='none';
        renderIngList();refreshRbPanels();
      });
      row.appendChild(btn);
    }
    el.appendChild(row);
  });
}

async function doSaveRecipe(){
  const name=document.getElementById('rb-name')?.value.trim();
  if(!name){showToast('Recipe name required','error');return;}
  if(recipeDraft.ingredients.length===0){showToast('Add at least one ingredient','error');return;}
  recipeDraft.portionSize=parseInt(document.getElementById('rb-portion')?.value)||1;
  recipeDraft.menuItemId=document.getElementById('rb-menu-item')?.value||'';
  // Collect multipliers from inputs
  if(recipeDraft.multipliers){
    Object.keys(recipeDraft.multipliers).forEach(key=>{
      const el=document.getElementById('rb-mult-'+key);
      if(el)recipeDraft.multipliers[key]=parseFloat(el.value)||1;
    });
  }
  const data={
    name,
    menuItemId:recipeDraft.menuItemId,
    ingredients:recipeDraft.ingredients,
    portionSize:recipeDraft.portionSize,
    multipliers:recipeDraft.multipliers||{},
    totalCost:calcDraftCost(),
    updatedAt:new Date().toISOString()
  };
  const btn=document.getElementById('rb-save-btn');
  btn.disabled=true;btn.textContent='⏳ Saving...';
  try{
    if(editingRecipe){
      const oldData={...editingRecipe};delete oldData.id;
      await addDoc(collection(db,'recipeVersions'),{recipeId:editingRecipe.id,...oldData,savedAt:new Date().toISOString()});
      await updateDoc(doc(db,'recipes',editingRecipe.id),data);
      showToast('Recipe updated! Previous version saved.','success');
    }else{
      data.createdAt=new Date().toISOString();
      await addDoc(collection(db,'recipes'),data);
      showToast('Recipe created!','success');
    }
    document.getElementById('rb-modal')?.remove();
    await loadRecipes();renderRecipesPage();
  }catch(e){
    showToast('Save failed: '+e.message,'error');
    btn.disabled=false;
    btn.textContent=editingRecipe?'💾 Save Recipe':'➕ Create Recipe';
  }
}
window.doSaveRecipe=doSaveRecipe;

window.copyRecipe=async function(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  const copy={...r,name:'Copy of '+r.name,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  delete copy.id;
  try{
    await addDoc(collection(db,'recipes'),copy);
    showToast('Recipe copied!','success');
    await loadRecipes();renderRecipesPage();
  }catch(e){showToast('Copy failed: '+e.message,'error');}
};

window.deleteRecipe=async function(id,name){
  if(!confirm('Delete recipe "'+name+'"?'))return;
  try{
    await deleteDoc(doc(db,'recipes',id));
    showToast('Deleted','success');
    await loadRecipes();renderRecipesPage();
  }catch(e){showToast('Delete failed: '+e.message,'error');}
};

window.showVersionHistory=async function(id){
  try{
    const snap=await getDocs(query(collection(db,'recipeVersions'),orderBy('savedAt','desc')));
    const versions=[];
    snap.forEach(d=>{if(d.data().recipeId===id)versions.push({id:d.id,...d.data()});});
    if(versions.length===0){showToast('No previous versions saved yet.','info');return;}
    const ex=document.getElementById('ver-modal');if(ex)ex.remove();
    const ov=document.createElement('div');ov.className='modal-overlay';ov.id='ver-modal';
    const modal=document.createElement('div');modal.className='modal';modal.style.maxWidth='500px';
    modal.innerHTML='<div class="modal-header"><div class="modal-title">🕐 Version History</div><button class="modal-close" id="ver-close">✕</button></div>';
    const mbody=document.createElement('div');mbody.className='modal-body';
    const intro=document.createElement('div');
    intro.style.cssText='font-size:0.78rem;color:#6B7C93;margin-bottom:14px;';
    intro.textContent=versions.length+' saved version'+(versions.length!==1?'s':'')+'. Click Restore to roll back.';
    mbody.appendChild(intro);
    versions.forEach((v,i)=>{
      const dt=new Date(v.savedAt).toLocaleString('en-PK');
      const card=document.createElement('div');
      card.style.cssText='background:#F5F8FC;border-radius:10px;padding:12px;margin-bottom:10px;';
      card.innerHTML=
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
          '<span style="font-weight:700;font-size:0.85rem;">v'+(versions.length-i)+' — '+dt+'</span>'+
        '</div>'+
        '<div style="font-size:0.75rem;color:#6B7C93;">'+(v.ingredients||[]).length+' ingredients · Cost: PKR '+Math.round(v.totalCost||0)+'</div>';
      const restoreBtn=document.createElement('button');
      restoreBtn.className='btn btn-secondary btn-sm';
      restoreBtn.style.marginTop='8px';
      restoreBtn.textContent='↩ Restore';
      restoreBtn.addEventListener('click',()=>restoreVersion(id,v.id));
      card.appendChild(restoreBtn);
      mbody.appendChild(card);
    });
    modal.appendChild(mbody);
    ov.appendChild(modal);
    ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
    document.body.appendChild(ov);
    document.getElementById('ver-close')?.addEventListener('click',()=>ov.remove());
  }catch(e){showToast('Could not load versions: '+e.message,'error');}
};

window.restoreVersion=async function(recipeId,versionId){
  if(!confirm('Restore this version? Current will be saved as a new version.'))return;
  try{
    const vSnap=await getDocs(collection(db,'recipeVersions'));
    let vData=null;
    vSnap.forEach(d=>{if(d.id===versionId)vData=d.data();});
    if(!vData){showToast('Version not found','error');return;}
    const current=recipes.find(r=>r.id===recipeId);
    if(current){
      const c={...current};delete c.id;
      await addDoc(collection(db,'recipeVersions'),{recipeId,...c,savedAt:new Date().toISOString()});
    }
    await updateDoc(doc(db,'recipes',recipeId),{
      ingredients:vData.ingredients,
      portionSize:vData.portionSize,
      totalCost:vData.totalCost,
      updatedAt:new Date().toISOString()
    });
    showToast('Version restored!','success');
    document.getElementById('ver-modal')?.remove();
    await loadRecipes();renderRecipesPage();
  }catch(e){showToast('Restore failed: '+e.message,'error');}
};

// ── AUTO STOCK DEDUCTION ENGINE ────────────────────────
window.autoDeductStock=async function(billItems){
  if(!billItems||billItems.length===0)return;
  const errors=[];
  for(const bi of billItems){
    if(bi.cancelled)continue;
    const recipe=recipes.find(r=>r.name===bi.name||(bi.itemId&&r.menuItemId===bi.itemId));
    if(!recipe)continue;
    const multiplier=(bi.qty||1)/(recipe.portionSize||1);
    for(const ing of recipe.ingredients||[]){
      const invItem=inventoryItems.find(i=>i.id===ing.inventoryId);
      if(!invItem)continue;
      const deduct=(ing.qty||0)*multiplier;
      const newStock=Math.max(0,(invItem.currentStock||0)-deduct);
      if((invItem.currentStock||0)<deduct)errors.push(invItem.name+' insufficient');
      try{
        await updateDoc(doc(db,'inventory',invItem.id),{currentStock:newStock,updatedAt:new Date().toISOString()});
        invItem.currentStock=newStock;
        await addDoc(collection(db,'stockMovements'),{
          inventoryId:invItem.id,ingredientName:invItem.name,type:'deduction',
          qty:deduct,note:'Auto: '+bi.name+' x'+bi.qty,
          previousStock:(invItem.currentStock||0)+deduct,newStock,
          createdAt:new Date().toISOString()
        });
      }catch(e){errors.push('Failed: '+invItem.name);}
    }
  }
  updateLowStockBadge();
  if(errors.length>0)showToast('Stock warnings: '+errors.join(', '),'error');
};
