<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cashier — The Munch Box</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F0F4F8;color:#1A2533;min-height:100vh;}
input,select,button{font-family:'Inter',sans-serif;}

/* ── TOPBAR ── */
.topbar{background:#0D1B2A;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-icon{font-size:1.4rem;}
.tb-name{font-size:1rem;font-weight:700;color:white;}
.tb-sub{font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-clock{font-size:0.85rem;font-weight:600;color:rgba(255,255,255,0.55);font-family:monospace;}
.refresh-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:6px 14px;border-radius:20px;font-size:0.76rem;font-weight:600;cursor:pointer;}
.refresh-btn:hover{background:rgba(255,255,255,0.15);color:white;}

/* ── TABS ── */
.main-tabs{display:flex;background:#0D1B2A;padding:0 24px;border-top:1px solid rgba(255,255,255,0.06);}
.main-tab{padding:10px 20px;font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.45);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;white-space:nowrap;}
.main-tab.active{color:white;border-bottom-color:#F4A736;}
.tab-badge{background:#E74C3C;color:white;font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;padding:20px 24px 0;}
.kpi{background:white;border:1px solid #E2EAF4;border-radius:10px;padding:14px 16px;border-top:3px solid transparent;}
.kpi-label{font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#6B7C93;margin-bottom:6px;}
.kpi-value{font-size:1.5rem;font-weight:800;color:#0D1B2A;line-height:1;}
.kpi-sub{font-size:0.72rem;color:#6B7C93;margin-top:3px;}
.kpi.blue{border-top-color:#2D7DD2;}.kpi.blue .kpi-value{color:#2D7DD2;}
.kpi.green{border-top-color:#27AE60;}.kpi.green .kpi-value{color:#27AE60;}
.kpi.gold{border-top-color:#C9A84C;}.kpi.gold .kpi-value{color:#C9A84C;}
.kpi.red{border-top-color:#E74C3C;}.kpi.red .kpi-value{color:#E74C3C;}

/* ── PAGE BODY ── */
.page-body{padding:20px 24px 40px;}

/* ── HALL SECTIONS ── */
.hall-section{margin-bottom:28px;}
.hall-sec-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.hall-sec-icon{font-size:1.1rem;}
.hall-sec-name{font-size:0.88rem;font-weight:700;color:#0D1B2A;}
.hall-sec-count{font-size:0.72rem;color:#6B7C93;}
.tables-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}

/* ── TABLE CARD ── */
.table-card{background:white;border:2px solid #E2EAF4;border-radius:12px;padding:14px;cursor:pointer;transition:all 0.15s;}
.table-card:hover{border-color:#2D7DD2;box-shadow:0 2px 12px rgba(45,125,210,0.12);}
.table-card.occupied{border-color:#F4A736;}
.table-card.occupied:hover{border-color:#E67E22;}
.tc-num{font-size:1rem;font-weight:800;color:#0D1B2A;margin-bottom:4px;}
.tc-status{font-size:0.72rem;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:6px;}
.tc-status.free{background:#F0F4F8;color:#6B7C93;}
.tc-status.occupied{background:#FEF9E7;color:#856404;}
.tc-total{font-size:0.82rem;font-weight:700;color:#2D7DD2;}
.tc-items{font-size:0.72rem;color:#6B7C93;margin-top:2px;}
.tc-token{font-size:0.65rem;color:#6B7C93;font-family:monospace;margin-top:2px;}

/* ── DELIVERY LIST ── */
.delivery-list{display:flex;flex-direction:column;gap:12px;}
.delivery-card{background:white;border:1.5px solid #E2EAF4;border-radius:12px;padding:16px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:14px;}
.delivery-card:hover{border-color:#E74C3C;box-shadow:0 2px 12px rgba(231,76,60,0.1);}
.dc-icon{font-size:1.8rem;flex-shrink:0;}
.dc-info{flex:1;min-width:0;}
.dc-name{font-size:0.9rem;font-weight:700;color:#0D1B2A;}
.dc-phone{font-size:0.75rem;color:#6B7C93;margin-top:1px;}
.dc-addr{font-size:0.72rem;color:#6B7C93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.dc-token{font-size:0.65rem;color:#6B7C93;font-family:monospace;}
.dc-right{text-align:right;flex-shrink:0;}
.dc-total{font-size:0.9rem;font-weight:800;color:#0D1B2A;}
.dc-status{font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:10px;margin-top:4px;display:inline-block;}
.ds-pending{background:#FEF9E7;color:#856404;}
.ds-preparing{background:#EBF3FF;color:#1A4A7A;}
.ds-ready{background:#EAFAF1;color:#1A7A4E;}
.ds-dispatched{background:#F0F4F8;color:#4A5568;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:white;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-header{padding:16px 20px;border-bottom:1px solid #E2EAF4;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;}
.modal-title{font-size:1rem;font-weight:700;color:#0D1B2A;}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6B7C93;padding:2px 6px;border-radius:6px;}
.modal-close:hover{background:#F0F4F8;}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid #E2EAF4;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}

/* ── BILL DETAIL ── */
.bill-meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.meta-chip{background:#F5F8FC;border-radius:8px;padding:8px 12px;}
.mc-label{font-size:0.62rem;color:#6B7C93;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.mc-value{font-size:0.82rem;font-weight:600;color:#0D1B2A;}
.bill-items-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.bill-items-table th{background:#F5F8FC;padding:8px 12px;text-align:left;font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6B7C93;border-bottom:1px solid #E2EAF4;}
.bill-items-table td{padding:9px 12px;font-size:0.82rem;border-bottom:1px solid #F0F4F8;}
.bill-items-table tr:last-child td{border-bottom:none;}
.bill-cancelled-row td{text-decoration:line-through;color:#E74C3C;opacity:0.7;}
.totals-section{background:#F5F8FC;border-radius:10px;padding:14px;}
.tot-line{display:flex;justify-content:space-between;font-size:0.82rem;padding:5px 0;border-bottom:1px dotted #E2EAF4;}
.tot-line:last-child{border-bottom:none;font-size:1rem;font-weight:800;color:#0D1B2A;padding-top:10px;margin-top:4px;border-top:1px solid #E2EAF4;}
.tot-line.disc{color:#E74C3C;}
.tot-line.tax{color:#1A4A7A;}

/* ── PAYMENT METHODS ── */
.pay-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.pay-btn{padding:12px;border-radius:12px;border:2px solid #E2EAF4;background:white;cursor:pointer;text-align:center;transition:all 0.15s;}
.pay-btn:hover{border-color:#2D7DD2;}
.pay-btn.sel{border-color:#27AE60;background:#EAFAF1;}
.pay-icon{font-size:1.5rem;margin-bottom:4px;}
.pay-label{font-size:0.75rem;font-weight:600;color:#1A2533;}

/* ── DELIVERY STATUS BUTTONS ── */
.del-status-btns{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}
.dsb{padding:9px 16px;border-radius:10px;border:2px solid #E2EAF4;background:white;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.dsb:hover{border-color:#2D7DD2;}
.dsb.active-preparing{background:#EBF3FF;border-color:#2D7DD2;color:#1A4A7A;}
.dsb.active-ready{background:#EAFAF1;border-color:#27AE60;color:#1A7A4E;}
.dsb.active-dispatched{background:#F0F4F8;border-color:#4A5568;color:#4A5568;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.btn-primary{background:#2D7DD2;color:white;}
.btn-primary:hover{background:#1A6BBE;}
.btn-primary:disabled{background:#A0C4E8;cursor:not-allowed;}
.btn-success{background:#27AE60;color:white;}
.btn-success:hover{background:#1E8449;}
.btn-secondary{background:white;color:#1A2533;border:1.5px solid #E2EAF4;}
.btn-secondary:hover{background:#F5F8FC;}
.btn-danger{background:#FDEDEC;color:#E74C3C;border:1.5px solid #FADBD8;}
.btn-print{background:#0D1B2A;color:white;}
.btn-sm{padding:6px 12px;font-size:0.76rem;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:#6B7C93;}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}
.empty-title{font-size:1rem;font-weight:600;color:#1A2533;margin-bottom:6px;}
.empty-desc{font-size:0.8rem;max-width:280px;margin:0 auto;line-height:1.6;}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#0D1B2A;color:white;padding:12px 18px;border-radius:10px;font-size:0.82rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;animation:slideIn 0.2s ease;}
.toast.success{background:#1E7A4E;}.toast.error{background:#C0392B;}.toast.info{background:#1A4A7A;}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;}
.loading-box{background:white;border-radius:12px;padding:32px 40px;text-align:center;}
.loading-spinner{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:10px;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

@media(max-width:600px){
  .kpi-row{padding:14px;}.page-body{padding:14px;}
  .bill-meta-grid{grid-template-columns:1fr 1fr;}
  .pay-methods{grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <span class="tb-icon">🖨️</span>
    <div>
      <div class="tb-name" id="tb-name">Cashier</div>
      <div class="tb-sub" id="tb-sub">Loading...</div>
    </div>
  </div>
  <div class="tb-right">
    <span class="tb-clock" id="tb-clock">--:--</span>
    <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh</button>
  </div>
</div>

<!-- MAIN TABS -->
<div class="main-tabs">
  <div class="main-tab active" id="tab-dinein" onclick="switchTab('dinein')">🍽️ Dine-In<span class="tab-badge" id="badge-dinein">0</span></div>
  <div class="main-tab" id="tab-delivery" onclick="switchTab('delivery')">🛵 Delivery<span class="tab-badge" id="badge-delivery">0</span></div>
  <div class="main-tab" id="tab-closed" onclick="switchTab('closed')">✅ Closed Today</div>
</div>

<!-- KPI ROW -->
<div class="kpi-row" id="kpi-row"></div>

<!-- PAGE BODY -->
<div class="page-body" id="page-body"></div>

<!-- TOAST -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <span class="loading-spinner">⏳</span>
    <div style="font-weight:600;color:#0D1B2A;">Loading cashier...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCopRca27yKpeeoTC5U7rHxPdGuRpqbgvs",
  authDomain: "the-munch-box-cfb7f.firebaseapp.com",
  projectId: "the-munch-box-cfb7f",
  storageBucket: "the-munch-box-cfb7f.firebasestorage.app",
  messagingSenderId: "1095328694961",
  appId: "1:1095328694961:web:9fd65fddcf00d3b84d9890"
};
const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);

let rs={}, hallsData={}, taxSettings={};
let openBills=[], deliveryOrders=[], closedToday=[];
let currentTab='dinein';
let selectedPayMethod='cash';
let unsub1=null, unsub2=null;

// ── HELPERS ──────────────────────────────────────────
function showToast(msg,type='info'){const w=document.getElementById('toast-wrap');const t=document.createElement('div');t.className='toast '+type;t.innerHTML='<span>'+(type==='success'?'✓':type==='error'?'✕':'ℹ')+'</span> '+msg;w.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},3500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setLoading(on){document.getElementById('loading-overlay').style.display=on?'flex':'none';}
function fmt(n){return Number(n||0).toLocaleString();}
function fmtDate(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});}

// ── CLOCK ─────────────────────────────────────────────
function startClock(){
  setInterval(()=>{
    const n=new Date();
    document.getElementById('tb-clock').textContent=n.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  },1000);
}

// ── LOAD STATIC DATA ──────────────────────────────────
async function loadStatic(){
  try{
    const rsSnap=await getDoc(doc(db,'settings','restaurant'));
    if(rsSnap.exists()){rs=rsSnap.data();document.getElementById('tb-name').textContent=rs.name||'Cashier';document.getElementById('tb-sub').textContent=(rs.name||'Restaurant')+' · Cashier Screen';}
    const hSnap=await getDoc(doc(db,'settings','halls'));
    if(hSnap.exists())hallsData=hSnap.data();
    const tSnap=await getDoc(doc(db,'settings','taxDiscount'));
    if(tSnap.exists())taxSettings=tSnap.data();
  }catch(e){showToast('Load error: '+e.message,'error');}
}

// ── REALTIME LISTENERS ────────────────────────────────
function startListeners(){
  // Open dine-in bills
  const q1=query(collection(db,'bills'),where('status','==','open'));
  unsub1=onSnapshot(q1,snap=>{openBills=[];snap.forEach(d=>openBills.push({id:d.id,...d.data()}));renderPage();updateBadges();renderKPIs();});

  // Delivery orders (pending/preparing/ready)
  const q2=query(collection(db,'deliveryOrders'),where('status','in',['pending','preparing','ready','dispatched']));
  unsub2=onSnapshot(q2,snap=>{
    deliveryOrders=[];
    const todayStart=new Date();todayStart.setHours(0,0,0,0);
    snap.forEach(d=>{
      const data={id:d.id,...d.data()};
      if(data.status!=='dispatched') deliveryOrders.push(data);
    });
    loadClosedToday().then(()=>{renderPage();updateBadges();renderKPIs();});
  });
}

async function loadClosedToday(){
  try{
    const todayStart=new Date();todayStart.setHours(0,0,0,0);
    const [bSnap,dSnap]=await Promise.all([
      getDocs(query(collection(db,'bills'),where('status','==','paid'))),
      getDocs(query(collection(db,'deliveryOrders'),where('status','==','dispatched')))
    ]);
    closedToday=[];
    bSnap.forEach(d=>{const data={id:d.id,...d.data(),_type:'dinein'};if(new Date(data.closedAt||data.updatedAt)>=todayStart)closedToday.push(data);});
    dSnap.forEach(d=>{const data={id:d.id,...d.data(),_type:'delivery'};if(new Date(data.closedAt||data.updatedAt)>=todayStart)closedToday.push(data);});
    closedToday.sort((a,b)=>new Date(b.closedAt||b.updatedAt)-new Date(a.closedAt||a.updatedAt));
  }catch(e){}
}

window.refreshAll=async function(){showToast('Refreshing...','info');await loadClosedToday();renderPage();renderKPIs();showToast('Refreshed','success');};

// ── KPIs ──────────────────────────────────────────────
function renderKPIs(){
  const todaySales=closedToday.reduce((s,b)=>s+(b.grandTotal||0),0);
  const todayCount=closedToday.length;
  const openCount=openBills.length;
  const delPending=deliveryOrders.filter(d=>d.status==='pending'||d.status==='preparing').length;
  document.getElementById('kpi-row').innerHTML=
    '<div class="kpi blue"><div class="kpi-label">Open Tables</div><div class="kpi-value">'+openCount+'</div><div class="kpi-sub">Active dine-in bills</div></div>'+
    '<div class="kpi red"><div class="kpi-label">Delivery Pending</div><div class="kpi-value">'+delPending+'</div><div class="kpi-sub">Needs dispatch</div></div>'+
    '<div class="kpi green"><div class="kpi-label">Today Sales</div><div class="kpi-value">PKR '+fmt(todaySales)+'</div><div class="kpi-sub">'+todayCount+' bills closed</div></div>'+
    '<div class="kpi gold"><div class="kpi-label">Closed Today</div><div class="kpi-value">'+todayCount+'</div><div class="kpi-sub">Paid & dispatched</div></div>';
}

function updateBadges(){
  document.getElementById('badge-dinein').textContent=openBills.length;
  document.getElementById('badge-delivery').textContent=deliveryOrders.length;
}

// ── TAB SWITCH ────────────────────────────────────────
window.switchTab=function(tab){
  currentTab=tab;
  ['dinein','delivery','closed'].forEach(t=>{
    document.getElementById('tab-'+t)?.classList.toggle('active',t===tab);
  });
  renderPage();
};

function renderPage(){
  if(currentTab==='dinein') renderDineIn();
  else if(currentTab==='delivery') renderDelivery();
  else renderClosed();
}

// ── DINE-IN ───────────────────────────────────────────
function renderDineIn(){
  const body=document.getElementById('page-body');
  const halls=hallsData.halls||[];
  if(halls.length===0){body.innerHTML='<div class="empty-state"><div class="empty-icon">🪑</div><div class="empty-title">No halls configured</div><div class="empty-desc">Set up halls in Admin Panel → Halls & Tables.</div></div>';return;}

  let html='';
  halls.forEach(h=>{
    const hallBills=openBills.filter(b=>b.hall===h.name);
    html+='<div class="hall-section">'+
      '<div class="hall-sec-header">'+
        '<span class="hall-sec-icon">'+h.icon+'</span>'+
        '<span class="hall-sec-name">'+esc(h.name)+'</span>'+
        '<span class="hall-sec-count">'+hallBills.length+' occupied / '+h.tables+' total</span>'+
      '</div>'+
      '<div class="tables-row">';
    for(let i=1;i<=h.tables;i++){
      const tn='T-'+String(i).padStart(2,'0');
      const bill=hallBills.find(b=>b.tableNo===tn);
      if(bill){
        html+='<div class="table-card occupied" onclick="openBillModal(\''+bill.id+'\',\'dinein\')">'+
          '<div class="tc-num">'+tn+'</div>'+
          '<span class="tc-status occupied">Occupied</span><br/>'+
          '<div class="tc-total">PKR '+fmt(bill.grandTotal)+'</div>'+
          '<div class="tc-items">'+(bill.items?.length||0)+' items</div>'+
          '<div class="tc-token">'+esc(bill.billToken||'')+'</div>'+
          '<div style="font-size:0.68rem;color:#6B7C93;margin-top:2px;">'+esc(bill.waiterName||'')+'</div>'+
        '</div>';
      }else{
        html+='<div class="table-card"><div class="tc-num">'+tn+'</div><span class="tc-status free">Free</span></div>';
      }
    }
    html+='</div></div>';
  });
  body.innerHTML=html||'<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">No open bills</div><div class="empty-desc">All tables are free.</div></div>';
}

// ── DELIVERY ──────────────────────────────────────────
function renderDelivery(){
  const body=document.getElementById('page-body');
  if(deliveryOrders.length===0){
    body.innerHTML='<div class="empty-state"><div class="empty-icon">🛵</div><div class="empty-title">No active deliveries</div><div class="empty-desc">Delivery orders will appear here once placed.</div></div>';
    return;
  }
  const statusOrder={pending:0,preparing:1,ready:2,dispatched:3};
  const sorted=[...deliveryOrders].sort((a,b)=>(statusOrder[a.deliveryStatus||a.status]||0)-(statusOrder[b.deliveryStatus||b.status]||0));
  body.innerHTML='<div class="delivery-list">'+sorted.map(d=>{
    const st=d.deliveryStatus||d.status||'pending';

// ── CLOSE DINE-IN BILL ────────────────────────────────
window.closeDineInBill=async function(id){
  const btn=event.currentTarget;btn.disabled=true;btn.textContent='⏳ Closing...';
  try{
    const bill=openBills.find(b=>b.id===id);
    await updateDoc(doc(db,'bills',id),{
      status:'paid',
      paymentMethod:selectedPayMethod,
      closedAt:new Date().toISOString(),
      updatedAt:new Date().toISOString()
    });
    // Auto stock deduction via recipe engine
    if(bill&&bill.items) await deductStockForBill(bill.items);
    closeBillModal();
    showToast('Bill closed — table is now free ✅','success');
    selectedPayMethod='cash';
  }catch(e){showToast('Error: '+e.message,'error');btn.disabled=false;btn.textContent='✅ Mark Paid & Close Table';}
};

// ── STOCK DEDUCTION ENGINE ────────────────────────────
async function deductStockForBill(items){
  if(!items||items.length===0)return;
  try{
    // Load recipes and inventory fresh
    const [recSnap,invSnap]=await Promise.all([
      getDocs(collection(db,'recipes')),
      getDocs(collection(db,'inventory'))
    ]);
    const recipes=[];recSnap.forEach(d=>recipes.push({id:d.id,...d.data()}));
    const inventory=[];invSnap.forEach(d=>inventory.push({id:d.id,...d.data()}));
    const warnings=[];
    for(const bi of items){
      if(bi.cancelled)continue;
      const recipe=recipes.find(r=>r.name===bi.name||(bi.itemId&&r.menuItemId===bi.itemId));
      if(!recipe)continue;
      // Determine size multiplier from bill item size field
    let sizeMultiplier=1.0;
    if(bi.size&&recipe.multipliers){
      const sizeKey=bi.size; // 'Full', 'M', 'L' etc.
      if(recipe.multipliers[sizeKey]) sizeMultiplier=parseFloat(recipe.multipliers[sizeKey])||1.0;
      // Also handle label-based matching (Half=1.0 base, Full=multiplier)
      if(bi.size==='Half'||bi.size==='S'||bi.size==='Small') sizeMultiplier=1.0;
    }
    const multiplier=sizeMultiplier*(bi.qty||1)/(recipe.portionSize||1);
      for(const ing of recipe.ingredients||[]){
        const invItem=inventory.find(i=>i.id===ing.inventoryId);
        if(!invItem)continue;
        const deduct=(ing.qty||0)*multiplier;
        const newStock=Math.max(0,(invItem.currentStock||0)-deduct);
        if((invItem.currentStock||0)<deduct) warnings.push(invItem.name);
        await updateDoc(doc(db,'inventory',invItem.id),{currentStock:newStock,updatedAt:new Date().toISOString()});
        await addDoc(collection(db,'stockMovements'),{inventoryId:invItem.id,ingredientName:invItem.name,type:'deduction',qty:deduct,note:'Auto: '+bi.name+' × '+bi.qty,previousStock:invItem.currentStock||0,newStock,createdAt:new Date().toISOString()});
      }
    }
    if(warnings.length>0) showToast('Low stock warning: '+warnings.join(', '),'error');
  }catch(e){showToast('Stock deduction note: '+e.message,'info');}
}

// ── CLOSE DELIVERY BILL ───────────────────────────────
window.closeDeliveryBill=async function(id){
  const btn=event.currentTarget;btn.disabled=true;btn.textContent='⏳ Closing...';
  try{
    const order=deliveryOrders.find(d=>d.id===id);
    await updateDoc(doc(db,'deliveryOrders',id),{
      status:'dispatched',
      deliveryStatus:'dispatched',
      paymentMethod:selectedPayMethod,
      closedAt:new Date().toISOString(),
      updatedAt:new Date().toISOString()
    });
    if(order&&order.items) await deductStockForBill(order.items);
    closeBillModal();
    showToast('Delivery marked dispatched & paid ✅','success');
    selectedPayMethod='cash';
  }catch(e){showToast('Error: '+e.message,'error');btn.disabled=false;btn.textContent='✅ Mark Dispatched & Paid';}
};

    msg+='\n';
  });
  msg+='━━━━━━━━━━━━━━━━━\n';
  if(bill.discountPkr>0) msg+='💸 Discount: − PKR '+fmt(bill.discountPkr)+'\n';

  msg+='💰 *TOTAL: PKR '+fmt(bill.grandTotal)+'*\n';

// ── UPDATE DELIVERY STATUS ────────────────────────────
window.updateDeliveryStatus=async function(id,status){
  try{
    await updateDoc(doc(db,'deliveryOrders',id),{
      deliveryStatus:status,
      updatedAt:new Date().toISOString()
    });
    // Update local state
    const order=deliveryOrders.find(d=>d.id===id);
    if(order) order.deliveryStatus=status;
    // Refresh modal
    closeBillModal();
    openBillModal(id,'delivery');
    showToast('Status updated: '+status,'success');
  }catch(e){showToast('Error: '+e.message,'error');}
};

// ── PRINT BILL ────────────────────────────────────────
window.printBill=function(id,type){
  let bill=null;
  if(type==='dinein') bill=openBills.find(b=>b.id===id)||closedToday.find(b=>b.id===id);
  else bill=deliveryOrders.find(b=>b.id===id)||closedToday.find(b=>b.id===id);
  if(!bill){showToast('Bill not found','error');return;}

  const isDelivery=type==='delivery';
  const w=window.open('','_blank','width=400,height=700');
  const activeItems=(bill.items||[]).filter(i=>!i.cancelled);
  const itemsHtml=activeItems.map(i=>
    '<tr><td style="padding:3px 2px;">'+i.name+(i.size?' ('+i.size+')':'')+(i.modifiers&&i.modifiers.length?' ['+i.modifiers.join(', ')+']':'')+'</td>'+
    '<td style="text-align:center;padding:3px 2px;">'+i.qty+'</td>'+
    '<td style="text-align:right;padding:3px 2px;">PKR '+fmt((i.qty||1)*(i.unitPrice||0))+'</td></tr>'
  ).join('');
  const taxes=(bill.taxes||[]).map(t=>'<tr><td colspan="2">'+t.name+' ('+t.rate+'%)</td><td style="text-align:right;color:#1A4A7A;">+PKR '+fmt(t.amount)+'</td></tr>').join('');

  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Bill</title>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:monospace;font-size:12px;padding:10px;max-width:300px;}
  .center{text-align:center;}.bold{font-weight:bold;}.line{border-top:1px dashed #000;margin:6px 0;}
  table{width:100%;border-collapse:collapse;}td{padding:2px;}
  .total-row{font-weight:bold;font-size:13px;border-top:1px solid #000;padding-top:4px;}
  </style></head><body>
  <div class="center bold" style="font-size:14px;">${rs.name||'Restaurant'}</div>
  <div class="center">${rs.tagline||''}</div>
  <div class="center">${rs.address||''}${rs.city?', '+rs.city:''}</div>
  <div class="center">${rs.phone||''}</div>
  <div class="line"></div>
  <div class="center">${isDelivery?'🛵 DELIVERY ORDER':'DINE-IN'}</div>
  <div>Bill: <strong>${bill.billToken||''}</strong></div>
  ${isDelivery?`<div>Customer: ${bill.customerName||''}</div><div>Phone: ${bill.customerPhone||''}</div><div>Address: ${bill.customerAddress||''}</div>`:`<div>${bill.hall||''} · ${bill.tableNo||''}</div>`}
  <div>Waiter: ${bill.waiterName||''}</div>
  <div>Date: ${new Date(bill.createdAt).toLocaleString('en-PK')}</div>
  <div class="line"></div>
  <table><thead><tr><th style="text-align:left;">Item</th><th>Qty</th><th style="text-align:right;">Total</th></tr></thead>
  <tbody>${itemsHtml}<tr><td colspan="3"><div class="line"></div></td></tr>
  ${bill.discountPkr>0?`<tr><td colspan="2">PKR Discount</td><td style="text-align:right;color:red;">-PKR ${fmt(bill.discountPkr)}</td></tr>`:''}
  ${bill.discountPct>0?`<tr><td colspan="2">Discount (${bill.discountPct}%)</td><td style="text-align:right;color:red;">-PKR ${fmt(bill.discountPctAmount)}</td></tr>`:''}
  ${taxes}
  <tr class="total-row"><td colspan="2">GRAND TOTAL</td><td style="text-align:right;">PKR ${fmt(bill.grandTotal)}</td></tr>
  ${bill.paymentMethod?`<tr><td colspan="3" style="color:#666;font-size:11px;">Payment: ${bill.paymentMethod}</td></tr>`:''}
  </tbody></table>
  <div class="line"></div>
  <div class="center">${rs.billFooter||'Thank you for dining with us!'}</div>
  ${rs.taxRegNo?`<div class="center" style="font-size:10px;">NTN: ${rs.taxRegNo}</div>`:''}
  </body></html>`);
  w.document.close();w.focus();setTimeout(()=>w.print(),400);
};
